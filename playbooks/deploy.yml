---
- name: Infrastructure as Code - Apache Containers
  hosts: webservers
  become: true
  vars:
    web_containers:
      - { name: "web-one", port: "8081" }
      - { name: "web-two", port: "8082" }
  roles:
    - apache_service

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
